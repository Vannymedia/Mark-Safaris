<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ngorongoro Crater viewed from the rim">
  <defs>
    <linearGradient id="skyN" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12190f"/>
      <stop offset="55%" stop-color="#33422a"/>
      <stop offset="100%" stop-color="#8a9a74"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#skyN)"/>
  <circle cx="300" cy="220" r="70" fill="#f2ecd9" opacity="0.5"/>
  <!-- crater rim, near (dark, high) -->
  <path d="M0,300 Q200,180 600,220 T1200,260 V0 H0 Z" fill="#12190f"/>
  <!-- crater bowl -->
  <path d="M0,300 Q200,180 600,220 T1200,260 L1200,700 Q900,760 600,760 Q300,760 0,700 Z" fill="#212b1b"/>
  <ellipse cx="600" cy="470" rx="560" ry="220" fill="#364227" opacity="0.55"/>
  <ellipse cx="600" cy="500" rx="420" ry="150" fill="#2a3620" opacity="0.7"/>
  <!-- soda lake -->
  <ellipse cx="640" cy="560" rx="150" ry="30" fill="#8a9a74" opacity="0.5"/>
  <!-- tiny animal dots on crater floor -->
  <g fill="#12190f">
    <circle cx="480" cy="530" r="5"/>
    <circle cx="500" cy="536" r="5"/>
    <circle cx="520" cy="528" r="5"/>
    <circle cx="740" cy="510" r="5"/>
    <circle cx="760" cy="516" r="5"/>
    <circle cx="420" cy="580" r="6"/>
    <circle cx="440" cy="586" r="6"/>
  </g>
  <!-- far rim -->
  <path d="M0,700 Q300,650 600,680 T1200,660 V800 H0 Z" fill="#12190f"/>
</svg>
