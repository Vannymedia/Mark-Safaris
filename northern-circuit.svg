    <path d="M180,660 C168,600 172,545 200,515 C190,502 194,478 216,472 C212,452 234,436 252,452 C270,436 292,452 286,474 C308,478 312,502 292,514 C314,545 310,600 288,660 C270,638 264,600 270,568 C252,586 228,586 214,568 C218,600 208,638 180,660 Z"/>
